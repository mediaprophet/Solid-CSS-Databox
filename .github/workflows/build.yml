# Build workflow for Server, Admin Demo, and Native Rust binaries.
name: Build

on:
  push:
    branches:
      - main
      - 'versions/*'
    tags:
      - 'v*'
  pull_request:
  workflow_call:
  workflow_dispatch:

env:
  NODE_OPTIONS: --require-module

jobs:
  # ── Build the Node.js server + forge-admin demo ────────────────────────
  build-server:
    name: Build Server & Admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24.x

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript + components
        run: npm run build

      - name: Build forge-admin demo
        run: npm run build:demo

      - name: Pack npm tarball
        run: npm pack

      - name: Upload server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-artifacts
          path: |
            *.tgz
            dist/
            config/
            templates/
            bin/
            package.json
            README.md
            LICENSE
          retention-days: 7

      - name: Upload forge-admin demo
        uses: actions/upload-artifact@v4
        with:
          name: forge-admin-demo
          path: docs/admin/
          retention-days: 7

  # ── Build native Rust binaries on a cross-platform matrix ──────────────
  build-native:
    name: Build Native (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    runs-on: ${{ matrix.os }}
    env:
      MACOSX_DEPLOYMENT_TARGET: '11.0'
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
          key: cargo-${{ matrix.target }}-${{ hashFiles('native/**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.target }}-

      - name: Install Linux dependencies (GTK, WebKit & OpenSSL)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libssl-dev liblzma-dev librsvg2-dev || sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev libssl-dev liblzma-dev librsvg2-dev

      - name: Build native binaries (release)
        working-directory: native
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binaries (Unix)
        if: matrix.archive != 'zip'
        run: |
          mkdir -p native-release
          cp native/target/${{ matrix.target }}/release/pos-edge native-release/
          cp native/target/${{ matrix.target }}/release/databox-installer native-release/
          cp native/target/${{ matrix.target }}/release/tray-supervisor native-release/
          tar -czf native-${{ matrix.target }}.tar.gz -C native-release .

      - name: Stage binaries (Windows)
        if: matrix.archive == 'zip'
        run: |
          New-Item -ItemType Directory -Force native-release
          Copy-Item native/target/${{ matrix.target }}/release/pos-edge.exe native-release/
          Copy-Item native/target/${{ matrix.target }}/release/databox-installer.exe native-release/
          Copy-Item native/target/${{ matrix.target }}/release/tray-supervisor.exe native-release/
          Compress-Archive -Path native-release/* -DestinationPath native-${{ matrix.target }}.zip

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: native-${{ matrix.target }}.${{ matrix.archive }}
          retention-days: 7
