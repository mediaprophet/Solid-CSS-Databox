name: Verify

on:
  workflow_call:

permissions:
  contents: read

env:
  NODE_OPTIONS: --require-module

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run lint

  unit:
    name: Unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm
      - name: Preserve LF source files on Windows
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf input
      - run: npm ci
      - run: npm run test:ts
      - run: npm run test:unit
      - name: Publish coverage
        if: runner.os == 'Linux'
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ github.token }}
          flag-name: unit-node-24

  integration-linux:
    name: Integration (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TEST_DOCKER: true
    services:
      sparql-endpoint:
        image: tenforce/virtuoso
        env:
          SPARQL_UPDATE: true
        ports:
          - 4000:8890
      redis:
        image: redis
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:integration -- --maxWorkers=2

  integration-windows:
    name: Integration (Windows)
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm
      - name: Preserve LF source files
        run: git config --global core.autocrlf input
      - run: npm ci
      - run: npm run build
      - run: npm run test:integration -- --maxWorkers=2

  packaged-configs:
    name: Packaged configuration validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      sparql-endpoint:
        image: tenforce/virtuoso
        env:
          SPARQL_UPDATE: true
        ports:
          - 4000:8890
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:deploy
