# Cross-platform release workflow.
#
# Triggers when a version tag (v*) is pushed or dispatched.
# Reuses ./.github/workflows/build.yml to build Server & Native artifacts,
# then creates a GitHub Release with all artifacts attached.
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v8.0.0)'
        required: true
  workflow_call:
    inputs:
      tag:
        description: 'Release tag (e.g. v8.0.0)'
        type: string
        required: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Artifacts
    uses: ./.github/workflows/build.yml

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          elif [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "name=v${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List artifacts
        run: find release-assets -type f | head -50

      - name: Prepare release files
        run: |
          mkdir -p release-final
          # Copy all archived build artifacts (native tar.gz, zip, and server tgz)
          find release-assets -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.tgz" \) -exec cp {} release-final/ \;
          # Bundle forge-admin demo directory if unarchived
          if [ -d release-assets/forge-admin-demo ] && [ ! -f release-final/forge-admin-demo.zip ]; then
            tar -czf release-final/forge-admin-demo.tar.gz -C release-assets/forge-admin-demo .
          fi
          echo "=== Release Files Ready ==="
          ls -la release-final/

      - name: Extract release notes
        id: notes
        run: |
          # Extract the top-most section from RELEASE_NOTES.md
          TAG="${{ steps.tag.outputs.name }}"
          # Try to extract the section for this tag; fall back to the first section
          awk -v tag="$TAG" '
            /^## / {
              if (found) exit
              if (index($0, tag)) found=1
            }
            found { print }
          ' RELEASE_NOTES.md > release-body.md
          # If empty, use first section
          if [ ! -s release-body.md ]; then
            awk '/^## /{if(p)exit; p=1} p' RELEASE_NOTES.md > release-body.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body_path: release-body.md
          files: release-final/*
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          generate_release_notes: true
