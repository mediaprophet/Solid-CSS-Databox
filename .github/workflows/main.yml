name: CI
on:
  push:
    branches:
      - main
      - 'versions/*'
    tags:
      - 'v*'
  pull_request:

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  npm-test:
    # Run the tests in every case
    uses: ./.github/workflows/npm-test.yml

  cth-test:
    # Run the Conformance Test Harness
    uses: ./.github/workflows/cth-test.yml
    with:
      ignore_failures: true
      version: 1.1.14 # The latest version that CSS is confirmed to pass

  # Solid Databox does not publish a container image from CI. The Dockerfile is kept so an operator
  # forking this repo can build and deploy their own image; publishing to a registry (image name and
  # credentials) is theirs to configure. See documentation/markdown/usage/starting-server.md.

  mkdocs-release:
    # Build and deploy documentation
    uses: ./.github/workflows/mkdocs.yml
    permissions:
      contents: write

  cross-release:
    # Build and publish cross-platform release artifacts
    uses: ./.github/workflows/release.yml
    permissions:
      contents: write
