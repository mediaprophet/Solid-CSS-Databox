apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: databox-cms
  labels:
    app.kubernetes.io/name: databox-cms
  annotations:
    databox.org/device-tls-caveat: Do not reuse this TLS-terminating Ingress for devices.<apex> mTLS.
spec:
  rules:
    - host: databox.example.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: databox-cms
                port:
                  name: http
  tls:
    - hosts:
        - databox.example.org
      secretName: databox-cms-tls
