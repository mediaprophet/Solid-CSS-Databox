<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Databox Org App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      min-height: 100dvh;
    }
    #databox-app { min-height: 100vh; min-height: 100dvh; }
    .databox-booting, .databox-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      color: #94a3b8;
    }
    .databox-error-screen, .databox-login, .databox-unlicensed {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 2rem;
      text-align: center;
    }
    .databox-error-screen h1, .databox-login h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    .databox-error-screen p, .databox-login p { color: #94a3b8; margin-bottom: 1.5rem; }
    .databox-error-screen button, .databox-login button {
      padding: 0.75rem 1.5rem;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
    }
    .databox-error-screen details { margin-top: 1rem; text-align: left; max-width: 30rem; }
    .databox-error-screen ul { padding-left: 1.5rem; color: #94a3b8; }
    .databox-nav {
      display: flex;
      overflow-x: auto;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 0.5rem;
      gap: 0.25rem;
    }
    .databox-nav-tab {
      padding: 0.5rem 1rem;
      background: transparent;
      color: #94a3b8;
      border: none;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .databox-nav-tab[aria-selected="true"] {
      background: #334155;
      color: #e2e8f0;
    }
    .databox-content { padding: 1rem; }
    .databox-error { color: #ef4444; padding: 1rem; }
  </style>
</head>
<body>
  <div id="databox-app">
    <div class="databox-booting">Starting…</div>
  </div>
  <script type="module" src="/src/index.ts"></script>
</body>
</html>
